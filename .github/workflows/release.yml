name: release

# Fires only when a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
# Builds a static-ish binary per platform and attaches them to a GitHub Release.
# Pushing the tag is a manual, owner-gated step — this never runs on its own.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # to create the Release and upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon — exercises the NEON SIMD path
            target: aarch64-apple-darwin
          - os: macos-13 # Intel mac — scalar fallback
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup update stable && rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf tarn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz tarn
          shasum -a 256 tarn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > tarn-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: tarn-${{ matrix.target }}
          path: tarn-*.tar.gz*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "tarn ${{ github.ref_name }}" \
            --generate-notes
