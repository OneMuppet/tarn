<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="tarn — a tiny, understandable terminal editor">
  <defs>
    <!-- Copper accent, echoing the Patina family -->
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#e0a064"/>
      <stop offset="0.5" stop-color="#c7752e"/>
      <stop offset="1"   stop-color="#9c561d"/>
    </linearGradient>
    <!-- The still water of the tarn -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2733"/>
      <stop offset="1" stop-color="#0d141c"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11181f"/>
      <stop offset="1" stop-color="#161f29"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="320" rx="18" fill="url(#sky)"/>

  <!-- Water surface: lower third is the lake -->
  <rect y="208" width="1200" height="112" fill="url(#water)"/>
  <line x1="0" y1="208" x2="1200" y2="208" stroke="#c7752e" stroke-opacity="0.25" stroke-width="1"/>

  <!-- A small clear mountain (a "tarn" sits in a cirque below a peak) -->
  <g opacity="0.9">
    <polygon points="120,208 240,70 300,140 360,90 470,208" fill="none" stroke="url(#copper)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Reflection of the peaks in the still water -->
    <polygon points="120,208 240,346 300,276 360,326 470,208" fill="none" stroke="#c7752e" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <!-- Faint ripple lines on the tarn -->
  <g stroke="#c7752e" stroke-opacity="0.14" stroke-width="1.5">
    <line x1="150" y1="246" x2="430" y2="246"/>
    <line x1="190" y1="278" x2="390" y2="278"/>
  </g>

  <!-- Wordmark -->
  <text x="560" y="180" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="150" font-weight="700" letter-spacing="4" fill="url(#copper)">tarn</text>
  <!-- Terminal cursor block: this is an editor, after all -->
  <rect x="978" y="78" width="34" height="104" fill="#c7752e" opacity="0.9"/>

  <!-- Tagline -->
  <text x="562" y="240" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="26" letter-spacing="1.5" fill="#9fb0c0">a tiny, understandable terminal editor</text>
  <text x="562" y="276" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="22" letter-spacing="1" fill="#6f8295">· that doubles as a scriptable .env tool for AI harnesses ·</text>
</svg>
