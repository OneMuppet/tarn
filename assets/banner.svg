<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="tarn — a tiny, understandable terminal editor">
  <defs>
    <!-- The name's story, told in the metal: polished copper that tarnishes,
         and at the tail oxidizes toward a green patina (the Patina sibling). -->
    <linearGradient id="tarnish" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#f0bd82"/>
      <stop offset="0.30" stop-color="#c7752e"/>
      <stop offset="0.62" stop-color="#7a4a22"/>
      <stop offset="0.86" stop-color="#3f3320"/>
      <stop offset="1.00" stop-color="#2f5d4f"/>
    </linearGradient>
    <linearGradient id="m-tarnish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.00" stop-color="#f0bd82"/>
      <stop offset="0.45" stop-color="#c7752e"/>
      <stop offset="0.80" stop-color="#6d4422"/>
      <stop offset="1.00" stop-color="#2f5d4f"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11181f"/>
      <stop offset="1" stop-color="#0c1116"/>
    </linearGradient>
  </defs>

  <!-- The whole banner is a terminal window: ink backdrop, rounded corners. -->
  <rect width="1200" height="320" rx="18" fill="url(#ink)"/>

  <!-- Window chrome: traffic-light dots tinted to the brand, + a faint title. -->
  <circle cx="40" cy="34" r="8" fill="#2f5d4f"/>
  <circle cx="68" cy="34" r="8" fill="#c7752e"/>
  <circle cx="96" cy="34" r="8" fill="#e0a064"/>
  <text x="600" y="40" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="17" letter-spacing="2" fill="#4a5663">~/tarn — editor</text>
  <line x1="16" y1="62" x2="1184" y2="62" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- A polished copper bar that tarnishes left→right: the visual thesis -->
  <rect x="96" y="120" width="640" height="6" rx="3" fill="url(#tarnish)" opacity="0.55"/>

  <!-- Wordmark, aging across its own letters -->
  <text x="92" y="238" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="156" font-weight="700" letter-spacing="6" fill="url(#tarnish)">tarn</text>

  <!-- Block cursor right after the word — patina-green, the payoff -->
  <rect x="516" y="126" width="34" height="108" fill="#2f5d4f"/>

  <!-- Prompt-style tagline: a real shell line -->
  <text x="96" y="288" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="25" letter-spacing="1">
    <tspan fill="#5fb89c">$</tspan><tspan fill="#9fb0c0" dx="14">a tiny, understandable terminal editor</tspan>
  </text>
  <rect x="742" y="270" width="13" height="24" fill="#9fb0c0" opacity="0.8"/>

  <!-- Cu, the mascot: a terminal-cursor critter, peeking from the right -->
  <g transform="translate(958,58) scale(0.86)">
    <rect x="114" y="40" width="12" height="22" fill="#6d4422"/>
    <rect x="104" y="22" width="32" height="20" rx="3" fill="#3f7d6a"/>
    <rect x="44"  y="62" width="22" height="22" fill="#c7752e"/>
    <rect x="174" y="62" width="22" height="22" fill="#7a4a22"/>
    <rect x="48" y="70" width="144" height="120" rx="16" fill="url(#m-tarnish)"/>
    <rect x="24"  y="116" width="22" height="34" rx="4" fill="#c7752e"/>
    <rect x="194" y="116" width="22" height="34" rx="4" fill="#4a6f60"/>
    <rect x="78"  y="104" width="28" height="30" rx="3" fill="#2b2018"/>
    <rect x="134" y="104" width="28" height="30" rx="3" fill="#2b2018"/>
    <rect x="84"  y="110" width="16" height="18" fill="#5fb89c"/>
    <rect x="140" y="110" width="16" height="18" fill="#5fb89c"/>
    <rect x="86"  y="112" width="5" height="5" fill="#0c1116"/>
    <rect x="142" y="112" width="5" height="5" fill="#0c1116"/>
    <rect x="98" y="160" width="44" height="9" rx="2" fill="#2b2018"/>
    <rect x="68"  y="186" width="26" height="16" rx="3" fill="#6d4422"/>
    <rect x="146" y="186" width="26" height="16" rx="3" fill="#3f7d6a"/>
  </g>
</svg>
