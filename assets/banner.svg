<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="tarn — a tiny, understandable terminal editor">
  <defs>
    <!-- The name's story, told in the metal: polished copper that tarnishes,
         and at the tail oxidizes toward a green patina (the Patina sibling). -->
    <linearGradient id="tarnish" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#f0bd82"/>  <!-- polished copper -->
      <stop offset="0.30" stop-color="#c7752e"/>  <!-- copper          -->
      <stop offset="0.62" stop-color="#7a4a22"/>  <!-- tarnishing       -->
      <stop offset="0.86" stop-color="#3f3320"/>  <!-- dark tarnish     -->
      <stop offset="1.00" stop-color="#2f5d4f"/>  <!-- verdigris patina -->
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11181f"/>
      <stop offset="1" stop-color="#0c1116"/>
    </linearGradient>
  </defs>

  <!-- Ink backdrop (the Patina family palette: ink + copper) -->
  <rect width="1200" height="300" rx="18" fill="url(#ink)"/>

  <!-- A polished copper bar that tarnishes left→right: the visual thesis -->
  <rect x="120" y="86" width="700" height="6" rx="3" fill="url(#tarnish)" opacity="0.55"/>

  <!-- Wordmark, aging across its own letters -->
  <text x="116" y="210" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="170" font-weight="700" letter-spacing="6" fill="url(#tarnish)">tarn</text>

  <!-- Terminal cursor block — it is an editor, after all. Patina-green: the payoff. -->
  <rect x="690" y="92" width="36" height="116" fill="#2f5d4f"/>

  <!-- Tagline -->
  <text x="124" y="258" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="25" letter-spacing="1.5" fill="#9fb0c0">a tiny, understandable terminal editor</text>

  <!-- Right-side note, set quiet -->
  <text x="1076" y="150" text-anchor="end" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="19" letter-spacing="1" fill="#5d6b78">tarnish</text>
  <text x="1076" y="180" text-anchor="end" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="19" letter-spacing="1" fill="#5d6b78">becomes a</text>
  <text x="1076" y="210" text-anchor="end" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="19" letter-spacing="1" fill="#6f8c7f">patina</text>
</svg>
