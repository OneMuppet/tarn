<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="Cu, the tarn mascot — a terminal-cursor critter">
  <defs>
    <!-- Same tarnish arc as the banner: polished copper aging toward patina. -->
    <linearGradient id="m-tarnish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0.00" stop-color="#f0bd82"/>
      <stop offset="0.45" stop-color="#c7752e"/>
      <stop offset="0.80" stop-color="#6d4422"/>
      <stop offset="1.00" stop-color="#2f5d4f"/>
    </linearGradient>
  </defs>

  <!-- Everything is rectilinear on purpose: this is a creature made of terminal cells. -->

  <!-- Antenna: a little cursor blinking above its head -->
  <rect x="114" y="40" width="12" height="22" fill="#6d4422"/>
  <rect x="104" y="22" width="32" height="20" rx="3" fill="#3f7d6a"/>

  <!-- Ears / corner pixels -->
  <rect x="44"  y="62" width="22" height="22" fill="#c7752e"/>
  <rect x="174" y="62" width="22" height="22" fill="#7a4a22"/>

  <!-- Body block -->
  <rect x="48" y="70" width="144" height="120" rx="16" fill="url(#m-tarnish)"/>

  <!-- Arms (side pixels) -->
  <rect x="24"  y="116" width="22" height="34" rx="4" fill="#c7752e"/>
  <rect x="194" y="116" width="22" height="34" rx="4" fill="#4a6f60"/>

  <!-- Eyes: patina-green terminal blocks, with an ink glint -->
  <rect x="78"  y="104" width="28" height="30" rx="3" fill="#2b2018"/>
  <rect x="134" y="104" width="28" height="30" rx="3" fill="#2b2018"/>
  <rect x="84"  y="110" width="16" height="18" fill="#5fb89c"/>
  <rect x="140" y="110" width="16" height="18" fill="#5fb89c"/>
  <rect x="86"  y="112" width="5"  height="5"  fill="#0c1116"/>
  <rect x="142" y="112" width="5"  height="5"  fill="#0c1116"/>

  <!-- Mouth: a blinking-cursor underscore -->
  <rect x="98" y="160" width="44" height="9" rx="2" fill="#2b2018"/>

  <!-- Feet -->
  <rect x="68"  y="186" width="26" height="16" rx="3" fill="#6d4422"/>
  <rect x="146" y="186" width="26" height="16" rx="3" fill="#3f7d6a"/>
</svg>
